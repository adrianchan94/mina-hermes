# ═══════════════════════════════════════════════════════════════════════
# Mina — Personal Companion for Marina
# Hermes Agent on MiniMax M2.7 Highspeed
# Multimodal: Gemma 4 26B via OpenRouter (images, video, audio)
# ═══════════════════════════════════════════════════════════════════════

# ── Model (text) ─────────────────────────────────────────────────────
model:
  default: "MiniMax-M2.7-highspeed"
  provider: custom
  base_url: "https://api.minimax.io/v1"
  api_key: "${MINIMAX_API_KEY}"
  include_thinking: true

# ── Agent behavior ───────────────────────────────────────────────────
agent:
  max_turns: 60
  reasoning_effort: medium
  tool_use_enforcement: auto

# ── Auxiliary models ─────────────────────────────────────────────────
# Gemma 4 26B for ALL multimodal (vision, video, audio, speech)
# MiniMax M2.7 for text-only tasks (cheaper, faster)
auxiliary:
  vision:
    provider: openrouter
    model: "google/gemma-4-26b-a4b-it"
    timeout: 60
  web_extract:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30
  compression:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 120
  session_search:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30
  flush_memories:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 60
  mcp:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30
  skills_hub:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30
  approval:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30

# ── Context compression ─────────────────────────────────────────────
# Flush memories BEFORE compressing so nothing is lost
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 25
  summary_model: "MiniMax-M2.7-highspeed"
  summary_provider: custom
  summary_base_url: "https://api.minimax.io/v1"
  summary_api_key: "${MINIMAX_API_KEY}"

# ── Memory (PERSISTENT — stored on /opt/data volume) ────────────────
# MEMORY.md = Mina's learned notes (favorite restaurants, preferences, etc.)
# USER.md = Marina's profile (built up over conversations)
# Both persist across restarts via NVMe volume at /opt/data
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 4000
  user_char_limit: 2500

# ── Session persistence ─────────────────────────────────────────────
# Sessions stored in /opt/data/sessions/ (SQLite + JSON index)
# Full conversation transcripts searchable via session_search
session_reset:
  mode: idle
  idle_hours: 48
  notify: true

group_sessions_per_user: true
unauthorized_dm_behavior: pair

# ── Speech-to-text (voice messages) ─────────────────────────────────
stt:
  enabled: true
  provider: local
  model: base                    # ~150MB, downloads reliably without HF auth
  language: en                   # Force English — avoids misdetection on short clips

# ── Terminal ─────────────────────────────────────────────────────────
terminal:
  backend: local
  cwd: "/opt/data"
  timeout: 180
  persistent_shell: true
  env_passthrough:
    - MINIMAX_API_KEY
    - OPENROUTER_API_KEY
    - SUPERMEMORY_API_KEY
    - TAVILY_API_KEY

# ── File handling ────────────────────────────────────────────────────
file_read_max_chars: 200000

# ── Code execution ──────────────────────────────────────────────────
code_execution:
  timeout: 300
  max_tool_calls: 40

# ── Web search ──────────────────────────────────────────────────────
web:
  backend: firecrawl

# ── Browser ──────────────────────────────────────────────────────────
browser:
  inactivity_timeout: 120
  command_timeout: 30
  record_sessions: false

# ── Platform toolsets ────────────────────────────────────────────────
platform_toolsets:
  cli: hermes-cli
  telegram: hermes-telegram

# ── Platforms ────────────────────────────────────────────────────────
platforms:
  telegram:
    enabled: true
    reply_to_mode: "first"
  api_server:
    enabled: true
    extra:
      host: "0.0.0.0"
      port: 8642
  discord:
    enabled: false
  slack:
    enabled: false

# ── Streaming ────────────────────────────────────────────────────────
streaming:
  enabled: true
  transport: "auto"
  discord: false
  cli: true
  edit_interval: 2.0
  buffer_threshold: 80
  min_tokens: 20

# ── Display ──────────────────────────────────────────────────────────
display:
  tool_progress: new
  tool_progress_command: true
  compact: true
  streaming: true
  show_cost: false
  show_reasoning: false
  bell_on_complete: false

# ── Human delay (off for speed) ─────────────────────────────────────
human_delay:
  mode: "off"

# ── Security ─────────────────────────────────────────────────────────
security:
  redact_secrets: true

approvals:
  mode: "off"

# ── Checkpoints ──────────────────────────────────────────────────────
checkpoints:
  enabled: true
  max_snapshots: 50

# ── MCP Servers (Supermemory — persistent memory across restarts) ────
mcp_servers:
  supermemory:
    url: "https://mcp.supermemory.ai/mcp"
    headers:
      Authorization: "Bearer ${SUPERMEMORY_API_KEY}"
    timeout: 30
    connection_timeout: 15

# ── Timezone ─────────────────────────────────────────────────────────
timezone: "Asia/Hong_Kong"
