# ═══════════════════════════════════════════════════════════════════════
# Mina — Personal Companion for Marina
# MiniMax M2.7 Highspeed — Full native toolkit
# ═══════════════════════════════════════════════════════════════════════

# ── Model ────────────────────────────────────────────────────────────
model:
  default: "MiniMax-M2.7-highspeed"
  provider: minimax

# ── Agent behavior ───────────────────────────────────────────────────
agent:
  max_turns: 90
  tool_use_enforcement: auto

# ── Few-shot primer ──────────────────────────────────────────────────
prefill_messages_file: "/opt/data/prefill.json"

# ── Auxiliary models ─────────────────────────────────────────────────
auxiliary:
  vision:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 45
  web_extract:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30
  compression:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 180
  session_search:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30
  flush_memories:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 60
  mcp:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30
  skills_hub:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30
  approval:
    provider: custom
    model: "MiniMax-M2.7-highspeed"
    base_url: "https://api.minimax.io/v1"
    api_key: "${MINIMAX_API_KEY}"
    timeout: 30

# ── Context compression ─────────────────────────────────────────────
compression:
  enabled: true
  threshold: 0.70
  target_ratio: 0.40
  protect_last_n: 50
  summary_model: "MiniMax-M2.7-highspeed"
  summary_provider: custom
  summary_base_url: "https://api.minimax.io/v1"
  summary_api_key: "${MINIMAX_API_KEY}"

# ── Memory ──────────────────────────────────────────────────────────
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 4000
  user_char_limit: 2500

# ── Terminal ─────────────────────────────────────────────────────────
terminal:
  backend: local
  cwd: "/opt/data"
  timeout: 180
  persistent_shell: true
  env_passthrough:
    - MINIMAX_API_KEY
    - OPENROUTER_API_KEY
    - SUPERMEMORY_API_KEY

# ── File handling ────────────────────────────────────────────────────
file_read_max_chars: 200000

# ── Code execution ──────────────────────────────────────────────────
code_execution:
  timeout: 300
  max_tool_calls: 60

# ── Web search ──────────────────────────────────────────────────────
web:
  backend: minimax

# ── Browser ──────────────────────────────────────────────────────────
browser:
  inactivity_timeout: 120
  command_timeout: 30
  record_sessions: false

# ── Platform toolsets ────────────────────────────────────────────────
platform_toolsets:
  cli: hermes-cli
  telegram: hermes-telegram

# ── Skills ───────────────────────────────────────────────────────────
skills:
  external_dirs:
    - /opt/hermes/baked-skills

# ── MCP Servers ──────────────────────────────────────────────────────
mcp_servers:
  supermemory:
    command: "python3"
    args: ["/opt/hermes/supermemory_mcp.py"]
    env:
      SUPERMEMORY_API_KEY: "${SUPERMEMORY_API_KEY}"
    timeout: 120
    connection_timeout: 60
  context7:
    command: "npx"
    args: ["-y", "@upstash/context7-mcp@latest"]
    timeout: 60
    connection_timeout: 30

# ── Platforms ────────────────────────────────────────────────────────
platforms:
  telegram:
    enabled: true
    reply_to_mode: "first"
  api_server:
    enabled: true
    extra:
      host: "0.0.0.0"
      port: 8642
  discord:
    enabled: false

# ── Streaming ────────────────────────────────────────────────────────
streaming:
  enabled: true
  transport: "auto"
  edit_interval: 2.0
  buffer_threshold: 80

# ── Display ──────────────────────────────────────────────────────────
display:
  tool_progress: new
  tool_progress_command: false
  compact: true
  streaming: true
  show_cost: false
  show_reasoning: true
  bell_on_complete: false

# ── STT ──────────────────────────────────────────────────────────────
stt:
  enabled: true
  provider: local
  model: base
  language: en

# ── Human delay ──────────────────────────────────────────────────────
human_delay:
  mode: "off"

# ── Session resets ──────────────────────────────────────────────────
session_reset:
  mode: idle
  idle_hours: 48
  notify: true

group_sessions_per_user: true
unauthorized_dm_behavior: pair

# ── Security ─────────────────────────────────────────────────────────
security:
  redact_secrets: true

approvals:
  mode: "off"

# ── Checkpoints ──────────────────────────────────────────────────────
checkpoints:
  enabled: true
  max_snapshots: 50

# ── Timezone ─────────────────────────────────────────────────────────
timezone: "Asia/Hong_Kong"
